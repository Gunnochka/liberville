<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сторінку не знайдено — Liberville</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#17120F;color:#f3ece4;font-family:'Geologica',sans-serif;text-align:center;padding:24px}
    .code{font-size:clamp(80px,18vw,160px);font-weight:600;color:#C0824E;line-height:1}
    h1{font-size:clamp(20px,4vw,28px);font-weight:400;margin:12px 0 8px}
    p{color:#b3a596;max-width:420px;margin-bottom:28px}
    a{display:inline-block;padding:14px 28px;border-radius:999px;background:#C0824E;color:#17120F;
      text-decoration:none;font-weight:500;transition:.25s}
    a:hover{background:#A2683B}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Сторінку не знайдено</h1>
  <p>На жаль, такої сторінки не існує або вона була переміщена.</p>
  <a href="/">Повернутись на головну</a>
</body>
</html>
